apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-multicontainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multicontainer
  template:
    metadata:
      labels:
        app: multicontainer
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
      - name: multitool
        image: wbitt/network-multitool
        ports:
        - containerPort: 8080
          name: multitool
        env:
        - name: HTTP_PORT
          value: "8080"
